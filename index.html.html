<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DZ Express Online Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <img src="public/logo.jpg" alt="DZ Express" class="logo" />
      <div class="header-text">
        <h1>DZ Express Online Shop</h1>
        <p>توصيل سريع لجميع ولايات الجزائر</p>
      </div>
    </div>
  </header>

  <!-- PRODUCTS SECTION -->
  <section id="products-section">
    <h2 class="section-title">🛍️ منتجاتنا</h2>
    <div id="products-grid" class="products-grid">
      <!-- Products injected by JS -->
    </div>
  </section>

  <!-- ORDER MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close">✕</button>

      <!-- Step 1: Product summary -->
      <div id="step-product" class="step active">
        <div id="modal-product-info"></div>
        <button class="btn-primary" id="btn-to-info">التالي ← أدخل معلوماتك</button>
      </div>

      <!-- Step 2: Customer info -->
      <div id="step-info" class="step">
        <h3>معلومات الطلبية</h3>
        <label>الاسم الكامل
          <input type="text" id="customer-name" placeholder="أدخل اسمك الكامل" />
        </label>
        <label>رقم الهاتف
          <input type="tel" id="customer-phone" placeholder="0555 000 000" />
        </label>
        <label>الولاية
          <select id="wilaya-select">
            <option value="">-- اختر الولاية --</option>
          </select>
        </label>

        <!-- Delivery options (shown after wilaya pick) -->
        <div id="delivery-options" class="delivery-options hidden">
          <p class="delivery-label">نوع التوصيل:</p>
          <div class="delivery-cards">
            <label class="delivery-card" id="card-bureau">
              <input type="radio" name="delivery" value="bureau" />
              <span class="card-icon">🏢</span>
              <span class="card-title">توصيل للمكتب</span>
              <span class="card-price" id="price-bureau">—</span>
            </label>
            <label class="delivery-card" id="card-home">
              <input type="radio" name="delivery" value="home" />
              <span class="card-icon">🏠</span>
              <span class="card-title">توصيل للباب</span>
              <span class="card-price" id="price-home">—</span>
            </label>
          </div>
        </div>

        <!-- Total -->
        <div id="total-box" class="total-box hidden">
          <div class="total-row"><span>سعر المنتج</span><span id="total-product">—</span></div>
          <div class="total-row"><span>سعر التوصيل</span><span id="total-delivery">—</span></div>
          <div class="total-row total-final"><span>المجموع</span><span id="total-sum">—</span></div>
        </div>

        <div class="step-btns">
          <button class="btn-secondary" id="btn-back-product">← رجوع</button>
          <button class="btn-primary" id="btn-confirm">✅ تأكيد الطلبية</button>
        </div>
      </div>

      <!-- Step 3: Success -->
      <div id="step-success" class="step">
        <div class="success-icon">🎉</div>
        <h3>تم تأكيد طلبيتك!</h3>
        <p>شكراً لك، سيتم التواصل معك قريباً.</p>
        <button class="btn-primary" id="btn-new-order">العودة للمتجر</button>
      </div>
    </div>
  </div>

  <!-- LOADING TOAST -->
  <div id="toast" class="toast hidden"></div>

  <footer>
    <p>© 2026 DZ Express Online Shop — جميع الحقوق محفوظة</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
